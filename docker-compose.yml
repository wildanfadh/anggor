version: '3.8'

services:
  anggor:
    build:
      context: .
      dockerfile: Dockerfile.anggor
    volumes:
      - .:/workspace
      - anggor-home:/root/.anggor
    environment:
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
      - GOOGLE_API_KEY
      - OLLAMA_HOST
      - OPENROUTER_API_KEY
      - GROQ_API_KEY
      - DEEPSEEK_API_KEY
    stdin_open: true
    tty: true
    working_dir: /workspace

volumes:
  anggor-home:
